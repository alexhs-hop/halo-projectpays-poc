name: Halo Review (project-pays PoC)

# PROJECT-PAYS model: the review runs with the REPO OWNER's ANTHROPIC_API_KEY,
# via pull_request_target so it runs the BASE-branch workflow (which a fork PR
# cannot modify) and the contributor never holds the key.
#
# SAFETY: this workflow checks out the PR head READ-ONLY and never executes it.
# Do not add any step that builds or runs the submission (no npm/pip install in
# submission/, no running solve/tests) — that would run untrusted code with the
# project key in the environment.
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: halo-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base (rubric/prompt/scripts — trusted)
        uses: actions/checkout@v4

      - name: Checkout PR head (untrusted) read-only into submission/
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: submission
          persist-credentials: false

      - name: Strip infra files from the submission (so only the task is reviewed; we never run them)
        run: rm -rf submission/.github submission/.halo submission/README.md

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code >/dev/null 2>&1

      - name: Run read-only review (project key)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::Set the ANTHROPIC_API_KEY repo secret (this is the project-pays key)."
            exit 1
          fi
          claude -p \
            --model claude-sonnet-4-6 \
            --allowed-tools "Read,Glob,Grep" \
            --permission-mode bypassPermissions \
            < .halo/halo-eval-prompt.md \
            | tee "$RUNNER_TEMP/verdict.md"

      - name: Report + gate
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .halo/report.sh "$RUNNER_TEMP/verdict.md"
